name: Pipeline de Controle de Qualidade  
  
on:  
  push:  
    branches: [ "main" ]  
  pull_request:  
    branches: [ "main" ]  
  
jobs:  
  testes_automatizados:  
    runs-on: ubuntu-latest  
    steps:  
    - name: Checkout do Repositorio  
      uses: actions/checkout@v3  
  
    - name: Setup do Python  
      uses: actions/setup-python@v4  
      with:  
        python-version: '3.11'  
  
    - name: Instalar Dependencias  
      run: |  
        python -m pip install --upgrade pip  
        pip install pytest  
  
    - name: Executar Pytest  
      run: |  
        pytest src/tests/  
      env:  
        PYTHONPATH: .